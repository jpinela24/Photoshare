services:
  photoshare:
    build: .
    # Or use a prebuilt image instead of building:
    # image: photoshare:latest
    container_name: photoshare
    restart: unless-stopped
    ports:
      - "8088:8080"             # host 8088 → container 8080 (8080 taken by homepage)
    environment:
      PHOTO_DIR: /photos        # library path inside the container (mounted below)
      DATA_DIR: /config         # where config/log/cert persist
      PORT: "8080"
      HTTP_ONLY: "true"         # plain HTTP (nginx reverse proxy in front for TLS)
      # First-run admin account (ignored once accounts exist — change in Settings).
      # Set ADMIN_PASSWORD to your own value before first start. If you leave it
      # unset, a random password is generated and printed once to `docker logs
      # photoshare` — log in with that, then change it. Don't ship a weak default.
      ADMIN_USER: admin
      # ADMIN_PASSWORD: "choose-a-strong-password"
      # Host LAN IP + published port so QR codes / "open on network" links are correct:
      SERVER_IP: "10.0.0.20"
      PUBLIC_PORT: "8088"
      # AUTO_SORT: "true"       # auto-file inbox uploads into Year/Month folders
      # AI semantic search — point at the ML sidecar below. Comment out (or
      # remove the ml service) to disable AI; the app then behaves as before.
      ML_URL: "http://photoshare-ml:8090"
    depends_on:
      - photoshare-ml
    volumes:
      - /mnt/data/MEMORIES:/photos                            # photo library (1.8T drive)
      # Absolute path — a relative "./photoshare-config" resolves differently
      # depending on which directory `docker compose` is run from, and after
      # a re-clone into a new folder it silently pointed at an empty config,
      # resetting the admin account back to defaults. Pin it here instead.
      - /home/jpinela/Photoshare/photoshare-config:/config

  # ── AI: CLIP embedding sidecar (local semantic search) ──────────────────────
  # Python + CLIP on CPU. First build downloads the model (~600 MB) and the
  # first index pass over a large library takes a while — it runs throttled in
  # the background. Remove this service (and ML_URL above) to turn AI off.
  photoshare-ml:
    build: ./ml
    container_name: photoshare-ml
    restart: unless-stopped
    # Not published on the host — only the photoshare container talks to it.
    expose:
      - "8090"

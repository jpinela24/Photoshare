name: Test

# Runs on every push/PR — unlike release.yml (which only fires on a version
# tag), this is the cheap fast-feedback check that should catch regressions
# like the legacy /api/admin/login mismatch or the defaultConfig() merge bug
# before they reach a tagged release.
on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      # main.go's //go:embed all:client/dist requires this to exist with at
      # least one file before `go vet`/`go test` can even compile the
      # package — they failed outright without it.
      - name: Build React client
        working-directory: client
        run: |
          npm ci
          npm run build
      - run: go vet ./...
      - run: go test ./...
      # Reachable-vulnerability scan of the dependency tree. Fails the build on
      # vulns actually called from our code — but NOT on standard-library-only
      # advisories, which we can't fix ourselves: they're resolved by whatever
      # Go patch release the GitHub runners happen to ship, so gating on them
      # just makes main go red for a few days every time a new stdlib CVE lands
      # (e.g. GO-2026-5856 in crypto/tls, fixed in go1.25.12). Those still print
      # in the logs; only third-party module vulns block the build.
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" -format json ./... > vuln.json || true
          # A finding is a real, reachable call when its trace has a top frame
          # with a function. trace[0] is the vulnerable symbol itself; ignore
          # findings whose vulnerable module is the stdlib.
          blocking=$(jq -r 'select(.finding.trace[0].function != null)
            | select(.finding.trace[0].module != "stdlib")
            | .finding.osv' vuln.json | sort -u)
          if [ -n "$blocking" ]; then
            echo "Reachable third-party vulnerabilities: $blocking"
            exit 1
          fi
          echo "No reachable third-party vulnerabilities (stdlib-only advisories, if any, are non-blocking)."

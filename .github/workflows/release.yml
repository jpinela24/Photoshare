name: Release

# Runs whenever a version tag is pushed (e.g. `git tag v2.3 && git push origin v2.3`).
# Builds the Windows installer and the Docker image, then attaches the
# installer to a GitHub Release for that tag (creating the release if it
# doesn't already exist) and pushes the image to GHCR.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write   # create/update the release and upload assets
  packages: write   # push the Docker image to ghcr.io

jobs:
  windows-installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Build React client
        working-directory: client
        run: |
          npm install
          npm run build

      - name: Embed exe icon + version metadata
        shell: bash # PowerShell mangles the -icon=… native arg on Windows runners
        run: go run github.com/josephspurrier/goversioninfo/cmd/goversioninfo@v1.7.0 -icon=windows/icon.ico -o=resource_windows_amd64.syso windows/versioninfo.json

      - name: Build photoshare.exe
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -ldflags "-H windowsgui -s -w" -o photoshare.exe .

      - name: Compile installer (Inno Setup)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer.iss

      - name: Attach installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: windows/Output/PhotoShareSetup.exe

  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/photoshare:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/photoshare:latest
